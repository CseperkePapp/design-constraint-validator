name: Workflow Automation CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  workflow-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Workflow automation typecheck
        run: npm run workflow:typecheck

      - name: Validate headers
        run: npm run validate-headers

      - name: Workflow integrity tests
        run: npm run workflow:test